name: Restore CSS

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/restore-css.yml'
      - 'data/css-chunks/**'
      - 'scripts/reassemble-css.py'

permissions:
  contents: write

jobs:
  restore-css:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reassemble css/nexx-tarot.css
        run: python3 scripts/reassemble-css.py

      - name: Commit CSS if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add css/nexx-tarot.css
          git diff --staged --quiet || git commit -m "Fix: restore full css/nexx-tarot.css via chunk reassembly"
          git push
