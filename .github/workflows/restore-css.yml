name: Restore CSS

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/restore-css.yml'
      - 'data/css-chunks/**'

permissions:
  contents: write

jobs:
  restore-css:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reassemble and write css/nexx-tarot.css
        run: |
          python3 - <<'PYEOF'
import base64, pathlib, glob
parts = []
for p in sorted(glob.glob('data/css-chunks/chunk-*.b64')):
    parts.append(pathlib.Path(p).read_text())
css = base64.b64decode(''.join(parts))
pathlib.Path('css').mkdir(exist_ok=True)
pathlib.Path('css/nexx-tarot.css').write_bytes(css)
print(f'Wrote {len(css)} bytes to css/nexx-tarot.css')
PYEOF

      - name: Commit CSS if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add css/nexx-tarot.css
          git diff --staged --quiet || git commit -m "Fix: restore full css/nexx-tarot.css via chunk reassembly"
          git push
