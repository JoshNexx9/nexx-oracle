name: Restore assets

on:
  push:
    paths:
      - data/asset-parts/**
  workflow_dispatch:

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reassemble assets from tarball parts
        run: |
          if [ ! -f data/asset-parts/part-00.b64 ]; then
            echo "Asset parts not uploaded yet — skipping"
            exit 0
          fi
          python3 scripts/reassemble-assets.py

      - name: Commit restored assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/
          if git diff --staged --quiet; then
            echo "Assets already up to date"
            exit 0
          fi
          git commit -m "Restore full assets/ from tarball parts"
          git push
