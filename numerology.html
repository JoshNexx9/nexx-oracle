<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEXX Numerology · Life Path</title>
  <link rel="stylesheet" href="css/nexx-tarot.css" />
  <link rel="icon" href="assets/logo.jpg" />
</head>
<body class="scanlines num-mode">
  <div class="app">
    <header>
      <img class="logo" src="assets/logo.jpg" alt="Numerology" />
      <div class="brand">
        <h1 class="glitch">Numerology</h1>
        <p>Life path · name code</p>
      </div>
      <nav class="nav-links">
        <a href="index.html" class="center-nav">Home</a>
        <a href="numerology.html" class="active">Numerology</a>
        <a href="astrology.html">Astrology</a>
        <a href="tarot.html">Tarot</a>
      </nav>
    </header>

    <section class="panel num-calc">
      <div class="num-calc-grid">
        <div class="field field-grow">
          <label for="num-name">Full name</label>
          <input type="text" id="num-name" placeholder="Josh Nexx" />
        </div>
        <div class="field">
          <label for="num-birth">Birth date</label>
          <input type="date" id="num-birth" />
        </div>
      </div>
      <button type="button" class="primary" id="btn-calc">Calculate</button>
    </section>

    <section class="panel num-result" id="num-result">
      <div class="num-result-row">
        <div><span class="meta">Life Path</span><strong class="num-big" id="num-lp">—</strong><p id="num-lp-mean">—</p></div>
        <div><span class="meta">Expression</span><strong class="num-big" id="num-nc">—</strong><p id="num-nc-mean">—</p></div>
      </div>
      <p id="num-synthesis" class="copy-text">—</p>
    </section>

    <section class="archive-section">
      <h2 class="section-title">Number meanings</h2>
      <div id="digit-grid" class="num-grid"></div>
    </section>

    <footer><a href="index.html">← Home</a></footer>
  </div>
  <script src="js/nexx-auth.js"></script>
  <script src="js/auth-gate.js"></script>
  <script src="js/nexx-certainty.js"></script>
  <script src="js/numerology.js"></script>
</body>
</html>
