<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEXX Pendulum · Yes / No</title>
  <link rel="stylesheet" href="css/nexx-tarot.css" />
  <link rel="icon" href="assets/logo.jpg" />
</head>
<body class="scanlines pendulum-mode">
  <div class="app">
    <header>
      <img class="logo" src="assets/logo.jpg" alt="Pendulum" />
      <div class="brand">
        <h1 class="glitch">Pendulum</h1>
        <p>Body as instrument</p>
      </div>
      <nav class="nav-links">
        <a href="index.html" class="center-nav">Home</a>
        <a href="pendulum.html" class="active">Pendulum</a>
        <a href="tarot.html">Tarot</a>
        <a href="certainty.html">Certainty</a>
      </nav>
    </header>

    <section class="panel pendulum-stage" id="pendulum-stage">
      <p class="pendulum-guide">Tilt your phone or drag the bob, then cast. Settles <strong>left</strong> = not yet · <strong>center</strong> = forming · <strong>right</strong> = yes.</p>
      <canvas id="pendulum-canvas" aria-label="Pendulum animation"></canvas>
      <div class="field field-grow">
        <label for="pendulum-question">Your question</label>
        <input type="text" id="pendulum-question" placeholder="Will it work out?" maxlength="200" />
      </div>
      <button type="button" class="primary" id="btn-pendulum">Cast Pendulum</button>
    </section>

    <section class="panel pendulum-result" id="pendulum-result" hidden>
      <p class="meta">The field returns</p>
      <h2 id="pendulum-answer" class="pendulum-answer">—</h2>
      <p id="pendulum-msg">—</p>
      <p id="pendulum-whisper" class="certainty-whisper">—</p>
    </section>

    <footer><a href="index.html">← Home</a></footer>
  </div>
  <script src="js/nexx-auth.js"></script>
  <script src="js/auth-gate.js"></script>
  <script src="js/nexx-certainty.js"></script>
  <script src="js/pendulum.js"></script>
</body>
</html>
