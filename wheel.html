<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEXX Luck Wheel · Josh Nexx</title>
  <link rel="stylesheet" href="css/nexx-tarot.css" />
  <link rel="icon" href="assets/logo.jpg" />
</head>
<body class="scanlines wheel-mode">
  <div class="app">
    <header>
      <img class="logo" src="assets/logo.jpg" alt="Wheel" />
      <div class="brand">
        <h1 class="glitch">Luck Wheel</h1>
        <p>Spin · fortunate again</p>
      </div>
      <nav class="nav-links">
        <a href="index.html" class="center-nav">Home</a>
        <a href="wheel.html" class="active">Wheel</a>
        <a href="pendulum.html">Pendulum</a>
        <a href="certainty.html">Certainty</a>
      </nav>
    </header>

    <section class="panel wheel-stage">
      <div class="wheel-pointer">▼</div>
      <div class="wheel-spin-wrap">
        <canvas id="wheel-canvas"></canvas>
      </div>
      <button type="button" class="primary" id="btn-spin">Spin the Wheel</button>
    </section>

    <section class="panel wheel-result" id="wheel-result" hidden>
      <h2 id="wheel-label">—</h2>
      <p id="wheel-message">—</p>
      <p id="wheel-certainty" class="certainty-whisper">—</p>
    </section>

    <footer><a href="index.html">← Home</a></footer>
  </div>
  <script src="js/nexx-auth.js"></script>
  <script src="js/auth-gate.js"></script>
  <script src="js/copy.js"></script>
  <script src="js/nexx-certainty.js"></script>
  <script src="js/wheel.js"></script>
</body>
</html>
