<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="NEXX Certainty — sanctuary of assurance. It works out." />
  <title>NEXX Certainty · Sanctuary</title>
  <link rel="stylesheet" href="css/nexx-tarot.css" />
  <link rel="icon" href="assets/logo.jpg" />
</head>
<body class="scanlines certainty-mode">
  <div class="app">
    <header>
      <img class="logo" src="assets/logo.jpg" alt="Certainty" />
      <div class="brand">
        <h1 class="glitch">Certainty</h1>
        <p>Place of assurance · not answers</p>
      </div>
      <nav class="nav-links">
        <a href="index.html" class="center-nav">Home</a>
        <a href="certainty.html" class="active">Certainty</a>
        <a href="tarot.html">Tarot</a>
        <a href="pendulum.html">Pendulum</a>
        <a href="wheel.html">Wheel</a>
      </nav>
    </header>

    <section class="panel certainty-hero">
      <img id="certainty-hero-art" src="assets/card-back.jpg" alt="Today's seal" class="certainty-hero-img" />
      <div>
        <p class="certainty-intro">You are safe. The arc bends toward resolution. Enter your concern — receive <strong>certainty</strong>, not prediction.</p>
        <div class="field field-grow">
          <label for="certainty-question">What needs to work out?</label>
          <textarea id="certainty-question" rows="2" placeholder="Optional — the field already leans yes"></textarea>
        </div>
        <button type="button" class="primary" id="btn-seal">Seal Certainty</button>
      </div>
    </section>

    <section class="panel certainty-result" id="certainty-result" hidden>
      <div class="certainty-breath" id="certainty-breath"></div>
      <blockquote id="certainty-affirm" class="certainty-affirm">—</blockquote>
      <div class="certainty-card-row">
        <img id="certainty-card-art" src="" alt="" />
        <div>
          <h2 id="certainty-card-name">—</h2>
          <p id="certainty-reading" class="copy-text">—</p>
          <p id="certainty-whisper" class="certainty-whisper">—</p>
        </div>
      </div>
      <button type="button" id="btn-copy-seal">Copy seal</button>
    </section>

    <footer><a href="index.html">← Home</a> · NEXX Certainty</footer>
  </div>
  <script src="js/nexx-auth.js"></script>
  <script src="js/auth-gate.js"></script>
  <script src="js/copy.js"></script>
  <script src="js/nexx-certainty.js"></script>
  <script src="js/readings.js"></script>
  <script src="js/certainty-page.js"></script>
</body>
</html>
